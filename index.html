<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0c0d10">
<title>Dennis Nguyen</title>
<meta name="description" content="Dennis Nguyen — software engineer, backend-leaning. Internal tools, automation, and deterministic AI. deterministic-agents, ai-workflow-engine, clarp.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://dn00.github.io">
<meta property="og:title" content="Dennis Nguyen">
<meta property="og:description" content="Software engineer — internal tools, automation, and deterministic AI.">
<meta property="og:image" content="https://dn00.github.io/assets/img/profile-photos/dtnguy1-medium.jpg">
<meta name="twitter:card" content="summary">
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/icons/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/img/icons/favicon/favicon-16x16.png">
<link rel="apple-touch-icon" href="assets/img/icons/favicon/apple-touch-icon.png">
<style>
  :root{--bg:#0c0d10;--ink:#d6dce6;--muted:#6f7a8d;--green:#5be39a;--cyan:#56b6ff;--violet:#b88bff;--amber:#ffcf6b;--line:#1b1e26;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:15px;line-height:1.6;
    background-image:radial-gradient(800px 400px at 70% 0%,rgba(86,182,255,.06),transparent 60%);}
  .term{max-width:820px;margin:0 auto;padding:1.4rem 1.2rem 5rem}
  .bar{display:flex;align-items:center;gap:.5rem;color:var(--muted);font-size:.8rem;border-bottom:1px solid var(--line);padding-bottom:.7rem}
  .dots{display:flex;gap:.4rem}.dots i{width:11px;height:11px;border-radius:50%;display:inline-block}
  .dots i:nth-child(1){background:#ff5f57}.dots i:nth-child(2){background:#febc2e}.dots i:nth-child(3){background:#28c840}
  .bar .t{margin-left:.4rem}
  .bar a{margin-left:auto;color:var(--muted);text-decoration:none}.bar a:hover{color:var(--cyan)}
  .feed{margin-top:1.1rem}
  .ln{white-space:pre-wrap}
  .pmt{color:var(--green)}.pmt .u{color:var(--violet)} .cmd{color:var(--ink)}
  .out{color:var(--muted);margin:.1rem 0 .9rem}
  .out b{color:var(--ink);font-weight:600}.out .c{color:var(--cyan)}.out .a{color:var(--amber)}
  a.proj{color:var(--cyan);text-decoration:none}a.proj:hover{text-decoration:underline}
  .chips{margin-top:1.4rem;display:flex;gap:.5rem;flex-wrap:wrap}
  .chip{font-size:.8rem;color:var(--muted);border:1px solid var(--line);border-radius:7px;padding:.35rem .7rem;cursor:pointer;background:#101218;user-select:none}
  .chip:hover{border-color:var(--cyan);color:var(--cyan)}
  .chip b{color:var(--ink)}
  .inputline{display:flex;align-items:center;gap:.5rem;margin-top:.5rem;border-top:1px solid var(--line);padding-top:.7rem}
  #cmdline{flex:1;background:transparent;border:none;outline:none;color:var(--ink);font-family:var(--mono);font-size:15px;caret-color:var(--green);padding:0;min-width:0}
  #cmdline::placeholder{color:#454d5e}
  .plist{display:flex;flex-direction:column;gap:.55rem;margin:.25rem 0 .9rem}
  .proj-item{display:block;text-decoration:none;color:inherit;border-left:2px solid var(--line);padding:.1rem 0 .1rem .85rem;transition:border-color .15s}
  .proj-item:hover{border-color:var(--cyan)}
  .proj-item .pi-name{color:var(--cyan);font-weight:600}
  .proj-item:hover .pi-name{text-decoration:underline}
  .proj-item .pi-tag{color:var(--muted);font-size:.72rem;margin-left:.5rem}
  .proj-item .pi-desc{display:block;color:var(--muted);font-size:.84rem;margin-top:.12rem;line-height:1.45}
  .hint{font-size:.72rem;color:var(--muted);margin-top:1.1rem}
  .hint b{color:var(--ink)}
  #ret{flex:none;background:transparent;border:1px solid var(--line);border-radius:7px;color:var(--muted);font-family:var(--mono);font-size:.72rem;padding:.32rem .56rem;cursor:pointer}
  #ret:hover{border-color:var(--green);color:var(--green)}
  .pgroup{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:#5a6573;margin:.7rem 0 .15rem}
  .pgroup:first-child{margin-top:0}
</style>
</head>
<body>
<div class="term">
  <div class="bar"><span class="dots"><i></i><i></i><i></i></span><span class="t">dennis@dn00 — zsh</span><a href="https://github.com/dn00" target="_blank" rel="noopener">github ↗</a></div>
  <div class="feed" id="feed"></div>
  <div class="inputline"><span class="pmt"><span class="u">dennis</span>@dn00 ~ %</span><input id="cmdline" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="terminal command"><button id="ret" title="run">⏎ enter</button></div>
  <div class="hint">just press <b>⏎ enter</b> to walk through, command by command — or type your own, or tap a chip:</div>
  <div class="chips" id="chips">
    <span class="chip" data-cmd="whoami">whoami</span>
    <span class="chip" data-cmd="approach">cat <b>approach.md</b></span>
    <span class="chip" data-cmd="projects">ls <b>projects/</b></span>
    <span class="chip" data-cmd="giant">cat <b>giant.md</b></span>
    <span class="chip" data-cmd="interests">cat <b>offline.txt</b></span>
    <span class="chip" data-cmd="resume">open <b>resume.pdf</b></span>
    <span class="chip" data-cmd="contact">contact</span>
  </div>
</div>
<script>
const OUT={
  whoami:`<span class="out"><b>Dennis Nguyen</b> — software engineer, backend-leaning. I build internal tools and automation: the systems a team runs on day to day. Six years of it.</span>`,
  approach:`<span class="out">I use LLMs to <b>plan</b>, not to <b>run</b>. The model drafts a structured pipeline; deterministic code checks it and executes it — so the same input gives the same output, and you can see why it did what it did.</span>`,
  projects:`<div class="plist">
  <div class="pgroup">recent</div>
  <a class="proj-item" href="https://github.com/dn00/deterministic-agents" target="_blank" rel="noopener"><span class="pi-name">deterministic-agents</span><span class="pi-tag">python</span><span class="pi-desc">LLM writes a typed pipeline; a plain executor runs it. Same input, same output.</span></a>
  <a class="proj-item" href="https://github.com/dn00/ai-workflow-engine" target="_blank" rel="noopener"><span class="pi-name">ai-workflow-engine</span><span class="pi-tag">python</span><span class="pi-desc">Turns vague access requests into workflows that get validated and logged before anything runs.</span></a>
  <a class="proj-item" href="https://github.com/dn00/clarp" target="_blank" rel="noopener"><span class="pi-name">clarp</span><span class="pi-tag">cli</span><span class="pi-desc">claude -p, billed to your Claude Code subscription instead of the metered API.</span></a>
  <div class="pgroup">earlier</div>
  <a class="proj-item" href="https://github.com/dn00/PreSnap" target="_blank" rel="noopener"><span class="pi-name">Previe</span><span class="pi-tag">android · 2017</span><span class="pi-desc">Camera app that's always pre-recording into a buffer — capture the moment before you hit record.</span></a>
  <a class="proj-item" href="https://github.com/dn00/AmaBay" target="_blank" rel="noopener"><span class="pi-name">Abay</span><span class="pi-tag">flask · 2016</span><span class="pi-desc">Amazon→eBay dropshipping manager — price-matching, listing automation, shipping updates.</span></a>
  <a class="proj-item" href="https://github.com/dn00/dexCube" target="_blank" rel="noopener"><span class="pi-name">dexCube</span><span class="pi-tag">unity · 2015</span><span class="pi-desc">A fast twitch arcade game — dodge and split cubes to survive.</span></a>
  <a class="proj-item" href="https://github.com/dn00/Circle-of-Fish" target="_blank" rel="noopener"><span class="pi-name">Circle of Fish</span><span class="pi-tag">unity · 2016</span><span class="pi-desc">A small Unity game prototype.</span></a>
  <a class="proj-item" href="https://github.com/dn00/camera-chat-head" target="_blank" rel="noopener"><span class="pi-name">camera-video-head</span><span class="pi-tag">android · 2015</span><span class="pi-desc">Floating "chat head" with live camera preview and recording — a concept build.</span></a>
</div>`,
  giant:`<span class="out">~6 years at Giant building content-ops tooling for media headed to Amazon, Apple TV, and Xbox. Cut partner onboarding from ~2 weeks to a couple of days, wrote the deploy pipeline behind ~18 releases, and built the dashboards the team ran on.</span>`,
  interests:`<span class="out">cars, games, and a Supra I keep modifying. Outside work it's mostly small tools and game prototypes.</span>`,
  resume:`<span class="out">opening <a class="proj" href="assets/pdfs/resume_2026-2.pdf" target="_blank" rel="noopener">resume.pdf</a> ▸</span>`,
  contact:`<span class="out"><a class="proj" href="https://github.com/dn00" target="_blank" rel="noopener">github.com/dn00</a> · <a class="proj" href="https://www.linkedin.com/in/dn00" target="_blank" rel="noopener">linkedin.com/in/dn00</a> · <a class="proj" href="mailto:dtnguy09@gmail.com">dtnguy09@gmail.com</a></span>`,
  help:`<span class="out">commands — <span class="c">whoami</span> · <span class="c">cat approach.md</span> · <span class="c">ls projects/</span> · <span class="c">cat giant.md</span> · <span class="c">cat offline.txt</span> · <span class="c">open resume.pdf</span> · <span class="c">contact</span> · <span class="c">clear</span>. type one and press enter, or tap a chip.</span>`,
};
const LABEL={whoami:'whoami',approach:'cat approach.md',projects:'ls projects/',giant:'cat giant.md',interests:'cat offline.txt',resume:'open resume.pdf',contact:'contact',help:'help'};
const ALIASES={'whoami':'whoami','cat approach.md':'approach','approach':'approach','approach.md':'approach','ls':'projects','ls projects':'projects','ls projects/':'projects','projects':'projects','cat giant.md':'giant','giant':'giant','giant.md':'giant','cat offline.txt':'interests','offline':'interests','offline.txt':'interests','interests':'interests','open resume.pdf':'resume','resume':'resume','resume.pdf':'resume','contact':'contact','help':'help','?':'help','clear':'clear','cls':'clear'};
const feed=document.getElementById('feed');
function emit(label,html){const b=document.createElement('div');b.innerHTML=`<div class="ln"><span class="pmt"><span class="u">dennis</span>@dn00 ~ %</span> <span class="cmd">${label}</span></div>`+html;feed.appendChild(b);window.scrollTo(0,document.body.scrollHeight);}
function runKey(key){if(key==='clear'){feed.innerHTML='';return;}emit(LABEL[key]||key,OUT[key]||'');}
function runRaw(raw){const t=raw.trim();if(!t)return;const safe=t.replace(/[<>]/g,'');const key=ALIASES[t.toLowerCase()];if(key==='clear'){feed.innerHTML='';return;}if(key){emit(LABEL[key]||safe,OUT[key]);}else{emit(safe,`<span class="out">command not found: <b>${safe}</b>. try <span class="c">help</span>.</span>`);}}
const input=document.getElementById('cmdline');
// guided tour: the input suggests one command at a time; press enter to run it
// and advance. type anything and the suggestion yields to what you type.
const TOUR=['whoami','approach','projects','giant','interests','resume','contact'];
let ti=0;
function refresh(){input.placeholder=TOUR[ti]?LABEL[TOUR[ti]]:'type a command…';}
function doEnter(){
  const val=input.value.trim();
  if(val===''){const k=TOUR[ti];if(k){runKey(k);ti=(ti+1)%TOUR.length;refresh();}}
  else{runRaw(val);input.value='';refresh();}
  input.focus();
}
input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doEnter();}});
document.getElementById('ret').addEventListener('click',doEnter);
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{runKey(c.dataset.cmd);input.focus();}));
// tap anywhere in the terminal (except links/chips/buttons) to focus the prompt
document.addEventListener('click',e=>{if(!e.target.closest('a')&&!e.target.closest('.chip')&&!e.target.closest('#ret')&&!e.target.closest('#cmdline'))input.focus();});
// intro line (not a command) + first suggestion
feed.innerHTML='<div class="out" style="opacity:.65"># press <b style="color:#5be39a">⏎ enter</b> to walk through, command by command — or type a command. try <span class="c">help</span>.</div>';
refresh();
</script>
</body>
</html>
